name: Backend CI and Render Deploy

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      run_performance_guard:
        description: Run manual performance guard against the deployed backend
        required: false
        default: false
        type: boolean
      performance_samples:
        description: Number of requests per endpoint for the benchmark
        required: false
        default: "20"
        type: string
      performance_p95_threshold_ms:
        description: Maximum allowed p95 latency in milliseconds
        required: false
        default: "800"
        type: string
      performance_mean_threshold_ms:
        description: Maximum allowed mean latency in milliseconds
        required: false
        default: "400"
        type: string

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  deploy_render:
    name: Trigger Render Deploy
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Validate Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi

      - name: Trigger deploy in Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  smoke_tests:
    name: Smoke Test Deployed Backend
    needs: deploy_render
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Smoke test deployed backend
        env:
          DEPLOYED_BACKEND_URL: ${{ vars.RENDER_SERVICE_URL }}
          EXPECT_API_DOCS_ENABLED: "false"
          EXPECT_ROOT_TEXT: "API DigitalAlertHub activa"
          SMOKE_TIMEOUT_MS: "600000"
          SMOKE_INTERVAL_MS: "10000"
        run: node scripts/smoke-deploy.mjs

  performance_guard:
    name: Performance Guard
    needs: smoke_tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance_guard == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run performance guard
        env:
          DEPLOYED_BACKEND_URL: ${{ vars.RENDER_SERVICE_URL }}
          PERF_SAMPLES: ${{ github.event.inputs.performance_samples }}
          PERF_P95_THRESHOLD_MS: ${{ github.event.inputs.performance_p95_threshold_ms }}
          PERF_MEAN_THRESHOLD_MS: ${{ github.event.inputs.performance_mean_threshold_ms }}
          PERF_ENDPOINTS: "/health,/"
        run: node scripts/benchmark-deploy.mjs
